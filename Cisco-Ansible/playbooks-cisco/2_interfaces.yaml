---
- name: Full interface config
  hosts: router1
  gather_facts: no

  tasks:
    - name: Configure interface properties
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: ANSIBLE
            enabled: true

    - name: Configure IP
      cisco.ios.ios_l3_interfaces:
        config:
          - name: VirtualPortGroup0
            ipv4:
              - address: 10.10.10.2/24
